<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sie Penganugerahan - Portal Panitia & Operasional</title>

    <!-- PWA Primary Meta Tags -->
    <meta name="title" content="Sie Penganugerahan" />
    <meta name="description" content="Aplikasi Operasional Sie Penganugerahan: Pengelolaan Nominasi, Administrasi Kegiatan, Koordinasi Panitia, dan Laporan Keuangan." />
    <meta name="theme-color" content="#f59e0b" />

    <!-- Web App Manifest & Favicons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="alternate icon" href="/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- iOS & Mobile Web App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sie Penganugerahan" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('Service Worker registered with scope:', reg.scope))
            .catch(err => console.warn('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
